<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="270" viewBox="0 0 1200 270" role="img" aria-labelledby="title desc">
  <title id="title">Buffetiser usage workflow</title>
  <desc id="desc">Buy shares, record returns, update prices, analyse performance and create backups.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#6fa7cd"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="270" rx="24" fill="#edf5f9"/>
  <g stroke="#6fa7cd" stroke-width="4" marker-end="url(#arrow)">
    <path d="M220 135 H275"/><path d="M445 135 H500"/><path d="M670 135 H725"/><path d="M895 135 H950"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g transform="translate(50 61)">
      <rect width="170" height="148" rx="18" fill="#143449"/>
      <circle cx="85" cy="46" r="25" fill="#3282b8"/>
      <path d="M70 46 h30 M85 31 v30" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <text x="85" y="95" fill="#fff" font-size="18" font-weight="700">Add trades</text>
      <text x="85" y="119" fill="#adcde2" font-size="12">Purchases and sales</text>
    </g>
    <g transform="translate(275 61)">
      <rect width="170" height="148" rx="18" fill="#fff"/>
      <circle cx="85" cy="46" r="25" fill="#e5f2f9"/>
      <text x="85" y="55" fill="#0f4c75" font-size="27" font-weight="700">$</text>
      <text x="85" y="95" fill="#143449" font-size="18" font-weight="700">Record returns</text>
      <text x="85" y="119" fill="#587080" font-size="12">Dividends and DRP</text>
    </g>
    <g transform="translate(500 61)">
      <rect width="170" height="148" rx="18" fill="#fff"/>
      <circle cx="85" cy="46" r="25" fill="#e9f7ef"/>
      <path d="M67 52 C74 31 93 30 103 42 M103 42 l-1-11 M103 42 l-11-1" fill="none" stroke="#399263" stroke-width="4" stroke-linecap="round"/>
      <text x="85" y="95" fill="#143449" font-size="18" font-weight="700">Update prices</text>
      <text x="85" y="119" fill="#587080" font-size="12">Manual or scheduled</text>
    </g>
    <g transform="translate(725 61)">
      <rect width="170" height="148" rx="18" fill="#fff"/>
      <circle cx="85" cy="46" r="25" fill="#f1ecfb"/>
      <path d="M67 55 L78 43 L87 50 L102 32" fill="none" stroke="#7256a8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="85" y="95" fill="#143449" font-size="18" font-weight="700">Analyse</text>
      <text x="85" y="119" fill="#587080" font-size="12">Charts and reports</text>
    </g>
    <g transform="translate(950 61)">
      <rect width="170" height="148" rx="18" fill="#fff"/>
      <circle cx="85" cy="46" r="25" fill="#fff1e7"/>
      <path d="M69 34 h32 v25 h-32z M75 34 v9 h20 v-9 M77 52 h16" fill="none" stroke="#bf6f31" stroke-width="3"/>
      <text x="85" y="95" fill="#143449" font-size="18" font-weight="700">Back up</text>
      <text x="85" y="119" fill="#587080" font-size="12">Portable PostgreSQL dump</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Buffetiser deployment architecture</title>
  <desc id="desc">A browser connects through Nginx to a React frontend and FastAPI backend backed by PostgreSQL, with yfinance supplying market prices.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#6fa7cd"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="390" rx="24" fill="#f2f7fa"/>
  <text x="600" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#143449">Buffetiser architecture</text>
  <g stroke="#6fa7cd" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M210 185 H285"/><path d="M485 185 H560"/><path d="M760 185 H835"/>
    <path d="M660 265 V320 H920 V270"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g transform="translate(50 115)">
      <rect width="160" height="140" rx="18" fill="#fff"/>
      <rect x="27" y="28" width="106" height="68" rx="6" fill="#e5f2f9" stroke="#3282b8" stroke-width="3"/>
      <path d="M55 112 h50" stroke="#3282b8" stroke-width="5" stroke-linecap="round"/>
      <text x="80" y="128" fill="#143449" font-size="17" font-weight="700">Browser</text>
    </g>
    <g transform="translate(285 115)">
      <rect width="200" height="140" rx="18" fill="#143449"/>
      <text x="100" y="58" fill="#fff" font-size="25" font-weight="700">Nginx</text>
      <text x="100" y="86" fill="#adcde2" font-size="13">React + static assets</text>
      <text x="100" y="108" fill="#adcde2" font-size="13">API reverse proxy</text>
    </g>
    <g transform="translate(560 115)">
      <rect width="200" height="140" rx="18" fill="#0f4c75"/>
      <text x="100" y="52" fill="#fff" font-size="24" font-weight="700">FastAPI</text>
      <text x="100" y="80" fill="#adcde2" font-size="13">Authentication</text>
      <text x="100" y="102" fill="#adcde2" font-size="13">Portfolio accounting</text>
      <text x="100" y="124" fill="#adcde2" font-size="13">Reports and backups</text>
    </g>
    <g transform="translate(835 115)">
      <rect width="200" height="140" rx="18" fill="#fff"/>
      <ellipse cx="100" cy="43" rx="55" ry="18" fill="#dcecf5" stroke="#3282b8" stroke-width="3"/>
      <path d="M45 43 v48 c0 10 25 18 55 18s55-8 55-18V43" fill="#eaf3f8" stroke="#3282b8" stroke-width="3"/>
      <path d="M45 67 c0 10 25 18 55 18s55-8 55-18" fill="none" stroke="#3282b8" stroke-width="2"/>
      <text x="100" y="132" fill="#143449" font-size="17" font-weight="700">PostgreSQL</text>
    </g>
    <g transform="translate(835 300)">
      <rect width="200" height="62" rx="16" fill="#e9f7ef"/>
      <text x="100" y="28" fill="#2e7650" font-size="17" font-weight="700">Yahoo Finance</text>
      <text x="100" y="48" fill="#587080" font-size="12">via yfinance</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif" fill="#587080" font-size="12">
    <text x="232" y="169">HTTP(S)</text>
    <text x="500" y="169">/api</text>
    <text x="775" y="169">SQL</text>
    <text x="705" y="314">daily prices</text>
  </g>
</svg>

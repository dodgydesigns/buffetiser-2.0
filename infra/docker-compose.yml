version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    depends_on:
      - db
    networks:
      - buffetiser

  nginx:
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - buffetiser

volumes:
  db_data:

networks:
  buffetiser:
    driver: bridge

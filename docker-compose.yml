services:
  db:
    image: postgres:16-alpine
    container_name: buffetiser_db
    restart: always
    environment:
      POSTGRES_USER: buffetiser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: BUFFETISER_DB
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buffetiser -d BUFFETISER_DB"]
      interval: 2s
      timeout: 5s
      retries: 15
    networks:
      - buffetiser
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buffetiser_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - buffetiser

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buffetiser_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - buffetiser

volumes:
  db_data:

networks:
  buffetiser:
    driver: bridge

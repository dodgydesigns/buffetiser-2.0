services:
  db:
    image: postgres:16-alpine
    container_name: buffetiser_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buffetiser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-BUFFETISER_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buffetiser -d BUFFETISER_DB"]
      interval: 2s
      timeout: 5s
      retries: 15
    networks:
      - buffetiser
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buffetiser_backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-buffetiser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-BUFFETISER_DB}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - buffetiser

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buffetiser_frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - buffetiser

volumes:
  db_data:

networks:
  buffetiser:
    driver: bridge
